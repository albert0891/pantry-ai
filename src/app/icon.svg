<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9B54" />
      <stop offset="100%" stop-color="#FF512F" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#56AB2F" />
      <stop offset="100%" stop-color="#A8E063" />
    </linearGradient>
  </defs>
  <g transform="translate(50, 50) rotate(20) translate(-50, -50)">
    <!-- Leaves -->
    <path d="M50 35 C40 20, 30 10, 45 5 C55 10, 50 25, 50 35 Z" fill="url(#greenGrad)" opacity="0.9"/>
    <path d="M50 35 C60 20, 70 10, 55 5 C45 10, 50 25, 50 35 Z" fill="url(#greenGrad)" opacity="0.8"/>
    <path d="M50 35 C50 15, 50 0, 65 10 C65 25, 50 35, 50 35 Z" fill="url(#greenGrad)" opacity="0.9"/>
    <!-- Carrot Body -->
    <path d="M35 40 Q50 30 65 40 L55 90 Q50 100 45 90 Z" fill="url(#orangeGrad)"/>
    <!-- Geometric overlay triangles for glassmorphism -->
    <polygon points="35,40 65,40 50,65" fill="#FFFFFF" opacity="0.25"/>
    <polygon points="50,65 65,40 55,90" fill="#FF8C00" opacity="0.3"/>
  </g>
</svg>
