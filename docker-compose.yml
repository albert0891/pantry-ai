version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pantry-ai-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pantry_db
    ports:
      - "5432:5432"
    volumes:
      - pantry_db_data:/var/lib/postgresql/data

volumes:
  pantry_db_data:
